<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="あなたに最適な補助金・支援制度をAIが診断します。年齢・家族構成・ライフスタイルに合わせた制度をご提案。" />
  <title>プロフィール設定 | BenefitAI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ページ本体 -->
  <main class="page-wrapper">

    <!-- メインコンテンツ -->
    <div class="container" style="padding-top: var(--space-6); padding-bottom: calc(var(--footer-nav-height) + var(--space-6));">
      <div class="form-card">
        <h2 class="form-card__title">アカウント設定</h2>

        <form id="profileForm" novalidate>

          <!-- Section 1: 基本情報 -->
          <section class="form-section">
            <h3 class="form-section__title">基本情報</h3>

            <div class="form-grid">
              <div class="form-group">
                <label for="age">年齢 <span class="required">*</span></label>
                <input
                  type="number"
                  id="age"
                  name="age"
                  min="18"
                  max="100"
                  placeholder="例：35"
                  autocomplete="off"
                />
                <span class="form-error" id="ageError">年齢を正しく入力してください</span>
              </div>

              <div class="form-group">
                <label>性別 <span class="required">*</span></label>
                <div class="chip-group chip-group--radio">
                  <label class="chip">
                    <input type="radio" name="gender" value="male" />
                    男性
                  </label>
                  <label class="chip">
                    <input type="radio" name="gender" value="female" />
                    女性
                  </label>
                  <label class="chip">
                    <input type="radio" name="gender" value="other" />
                    その他
                  </label>
                  <label class="chip">
                    <input type="radio" name="gender" value="noanswer" />
                    回答しない
                  </label>
                </div>
              </div>
            </div>
          </section>

          <div class="section-divider"></div>

          <!-- Section 2: 居住地 -->
          <section class="form-section">
            <h3 class="form-section__title">居住地</h3>

            <div class="form-grid">
              <div class="form-group">
                <label for="prefecture">都道府県 <span class="required">*</span></label>
                <select id="prefecture" name="prefecture">
                  <option value="">都道府県を選択</option>
                  <option value="北海道">北海道</option>
                  <option value="青森県">青森県</option>
                  <option value="岩手県">岩手県</option>
                  <option value="宮城県">宮城県</option>
                  <option value="秋田県">秋田県</option>
                  <option value="山形県">山形県</option>
                  <option value="福島県">福島県</option>
                  <option value="茨城県">茨城県</option>
                  <option value="栃木県">栃木県</option>
                  <option value="群馬県">群馬県</option>
                  <option value="埼玉県">埼玉県</option>
                  <option value="千葉県">千葉県</option>
                  <option value="東京都">東京都</option>
                  <option value="神奈川県">神奈川県</option>
                  <option value="新潟県">新潟県</option>
                  <option value="富山県">富山県</option>
                  <option value="石川県">石川県</option>
                  <option value="福井県">福井県</option>
                  <option value="山梨県">山梨県</option>
                  <option value="長野県">長野県</option>
                  <option value="岐阜県">岐阜県</option>
                  <option value="静岡県">静岡県</option>
                  <option value="愛知県">愛知県</option>
                  <option value="三重県">三重県</option>
                  <option value="滋賀県">滋賀県</option>
                  <option value="京都府">京都府</option>
                  <option value="大阪府">大阪府</option>
                  <option value="兵庫県">兵庫県</option>
                  <option value="奈良県">奈良県</option>
                  <option value="和歌山県">和歌山県</option>
                  <option value="鳥取県">鳥取県</option>
                  <option value="島根県">島根県</option>
                  <option value="岡山県">岡山県</option>
                  <option value="広島県">広島県</option>
                  <option value="山口県">山口県</option>
                  <option value="徳島県">徳島県</option>
                  <option value="香川県">香川県</option>
                  <option value="愛媛県">愛媛県</option>
                  <option value="高知県">高知県</option>
                  <option value="福岡県">福岡県</option>
                  <option value="佐賀県">佐賀県</option>
                  <option value="長崎県">長崎県</option>
                  <option value="熊本県">熊本県</option>
                  <option value="大分県">大分県</option>
                  <option value="宮崎県">宮崎県</option>
                  <option value="鹿児島県">鹿児島県</option>
                  <option value="沖縄県">沖縄県</option>
                </select>
              </div>

              <div class="form-group">
                <label for="city">市区町村</label>
                <input
                  type="text"
                  id="city"
                  name="city"
                  placeholder="例：大阪市北区"
                  autocomplete="address-level2"
                />
              </div>
            </div>
          </section>

          <div class="section-divider"></div>

          <!-- Section 3: 世帯・家族構成 -->
          <section class="form-section">
            <h3 class="form-section__title">世帯・家族構成 <span class="required">*</span></h3>

            <div class="form-group">
              <div class="chip-group chip-group--radio chip-group--household">
                <label class="chip">
                  <input type="radio" name="household" value="single" />
                  単身
                </label>
                <label class="chip">
                  <input type="radio" name="household" value="couple" />
                  夫婦（子どもなし）
                </label>
                <label class="chip">
                  <input type="radio" name="household" value="child" />
                  子どもあり
                </label>
                <label class="chip">
                  <input type="radio" name="household" value="elderly" />
                  高齢者と同居
                </label>
              </div>
            </div>
          </section>

          <div class="section-divider"></div>

          <!-- Section 4: 収入・職業 -->
          <section class="form-section">
            <h3 class="form-section__title">収入・職業</h3>

            <div class="form-grid">
              <div class="form-group">
                <label for="income">年収 <span class="required">*</span></label>
                <select id="income" name="income">
                  <option value="">年収を選択</option>
                  <option value="100">100万円未満</option>
                  <option value="200">100〜200万円台</option>
                  <option value="400">300〜400万円台</option>
                  <option value="500">500〜600万円台</option>
                  <option value="800">700〜800万円台</option>
                  <option value="900">900万円以上</option>
                  <option value="回答しない">回答しない</option>
                </select>
              </div>

              <div class="form-group">
                <label for="occupation">職業 <span class="required">*</span></label>
                <select id="occupation" name="occupation">
                  <option value="">職業を選択</option>
                  <option value="employee">会社員</option>
                  <option value="civil">公務員</option>
                  <option value="freelance">自営業・フリーランス</option>
                  <option value="parttime">パート・アルバイト</option>
                  <option value="unemployed">無職</option>
                  <option value="other">その他</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label>雇用形態</label>
              <div class="chip-group chip-group--radio">
                <label class="chip">
                  <input type="radio" name="employment" value="fulltime" />
                  正社員
                </label>
                <label class="chip">
                  <input type="radio" name="employment" value="parttime" />
                  非正規
                </label>
                <label class="chip">
                  <input type="radio" name="employment" value="self" />
                  自営
                </label>
                <label class="chip">
                  <input type="radio" name="employment" value="other" />
                  その他
                </label>
              </div>
            </div>
          </section>

          <div class="section-divider"></div>

          <!-- Section 5: 状況・予定 -->
          <section class="form-section">
            <h3 class="form-section__title">状況・予定</h3>
            <p class="form-section__desc">該当するものをすべてオンにしてください</p>

            <div class="form-group">
              <div class="toggle-wrapper">
                <label class="toggle-label" for="childcare">
                  子育て中・予定あり
                  <span class="toggle-label__sub">0〜15歳の子どもがいる、または妊娠中・予定がある</span>
                </label>
                <label class="toggle-switch">
                  <input type="checkbox" id="childcare" name="childcare" />
                  <span class="toggle-slider"></span>
                </label>
              </div>

              <div class="toggle-wrapper">
                <label class="toggle-label" for="nursing">
                  介護中・介護予定あり
                  <span class="toggle-label__sub">家族の介護をしている、または近い将来介護が必要な状況</span>
                </label>
                <label class="toggle-switch">
                  <input type="checkbox" id="nursing" name="nursing" />
                  <span class="toggle-slider"></span>
                </label>
              </div>

              <div class="toggle-wrapper">
                <label class="toggle-label" for="disability">
                  障害者手帳あり
                  <span class="toggle-label__sub">本人または同居家族が障害者手帳を所持している</span>
                </label>
                <label class="toggle-switch">
                  <input type="checkbox" id="disability" name="disability" />
                  <span class="toggle-slider"></span>
                </label>
              </div>

              <div class="toggle-wrapper">
                <label class="toggle-label" for="relocation">
                  引っ越し・移住予定あり
                  <span class="toggle-label__sub">都市部から地方、または都道府県をまたぐ引越しを検討している</span>
                </label>
                <label class="toggle-switch">
                  <input type="checkbox" id="relocation" name="relocation" />
                  <span class="toggle-slider"></span>
                </label>
              </div>

              <!-- 移住サブ質問（relocation ON時のみ表示） -->
              <div id="relocationSubQuestions" class="relocation-sub-section" style="display: none;">
                <div class="form-group">
                  <label class="relocation-sub-label">移住を検討している地域はありますか？</label>
                  <div class="chip-group chip-group--radio">
                    <label class="chip">
                      <input type="radio" name="relocationRegion" value="hokkaido" />
                      北海道
                    </label>
                    <label class="chip">
                      <input type="radio" name="relocationRegion" value="tohoku" />
                      東北
                    </label>
                    <label class="chip">
                      <input type="radio" name="relocationRegion" value="kanto" />
                      関東
                    </label>
                    <label class="chip">
                      <input type="radio" name="relocationRegion" value="chubu" />
                      中部
                    </label>
                    <label class="chip">
                      <input type="radio" name="relocationRegion" value="kinki" />
                      近畿
                    </label>
                    <label class="chip">
                      <input type="radio" name="relocationRegion" value="chugoku" />
                      中国
                    </label>
                    <label class="chip">
                      <input type="radio" name="relocationRegion" value="shikoku" />
                      四国
                    </label>
                    <label class="chip">
                      <input type="radio" name="relocationRegion" value="kyushu" />
                      九州・沖縄
                    </label>
                    <label class="chip">
                      <input type="radio" name="relocationRegion" value="undecided" />
                      まだ決まっていない
                    </label>
                  </div>
                </div>
                <div class="form-group" id="relocationOpenToOtherGroup">
                  <label class="relocation-sub-label">条件に合う支援制度が充実している地域も知りたいですか？</label>
                  <div class="chip-group chip-group--radio">
                    <label class="chip">
                      <input type="radio" name="relocationOpenToOther" value="yes" />
                      はい
                    </label>
                    <label class="chip">
                      <input type="radio" name="relocationOpenToOther" value="no" />
                      いいえ
                    </label>
                  </div>
                </div>
              </div>

              <div class="toggle-wrapper">
                <label class="toggle-label" for="startup">
                  開業・起業予定あり
                  <span class="toggle-label__sub">新しいビジネスの立ち上げや独立を考えている</span>
                </label>
                <label class="toggle-switch">
                  <input type="checkbox" id="startup" name="startup" />
                  <span class="toggle-slider"></span>
                </label>
              </div>

              <div class="toggle-wrapper">
                <label class="toggle-label" for="housing">
                  住宅購入予定あり
                  <span class="toggle-label__sub">新築・中古問わず住宅の購入を検討している</span>
                </label>
                <label class="toggle-switch">
                  <input type="checkbox" id="housing" name="housing" />
                  <span class="toggle-slider"></span>
                </label>
              </div>

              <div class="toggle-wrapper">
                <label class="toggle-label" for="car">
                  車の購入予定あり
                  <span class="toggle-label__sub">新車・中古車・電気自動車などの購入を検討している</span>
                </label>
                <label class="toggle-switch">
                  <input type="checkbox" id="car" name="car" />
                  <span class="toggle-slider"></span>
                </label>
              </div>
            </div>
          </section>

          <div class="section-divider"></div>

          <!-- Section 7: 重視する条件 -->
          <section class="form-section">
            <h3 class="form-section__title">重視する条件</h3>
            <p class="form-section__desc">複数選択できます</p>

            <div class="form-group">
              <div class="chip-group chip-group--checkbox">
                <label class="chip">
                  <input type="checkbox" name="priorities" value="immediate" />
                  すぐもらえる
                </label>
                <label class="chip">
                  <input type="checkbox" name="priorities" value="large_amount" />
                  金額が大きい
                </label>
                <label class="chip">
                  <input type="checkbox" name="priorities" value="easy" />
                  手続きが簡単
                </label>
                <label class="chip">
                  <input type="checkbox" name="priorities" value="future_use" />
                  将来使える
                </label>
                <label class="chip">
                  <input type="checkbox" name="priorities" value="post_move" />
                  引越し後に使える
                </label>
              </div>
            </div>
          </section>

          <div class="section-divider"></div>

          <!-- Section 8: 通知設定 -->
          <section class="form-section">
            <h3 class="form-section__title">通知設定</h3>

            <div class="form-group">
              <div class="toggle-wrapper">
                <label class="toggle-label" for="globalNotificationToggle">
                  新しい制度が追加されたら通知を受け取る
                  <span class="toggle-label__sub">あなたのプロフィールに合う制度が追加されたときにお知らせします</span>
                </label>
                <label class="toggle-switch">
                  <input type="checkbox" id="globalNotificationToggle" />
                  <span class="toggle-slider"></span>
                </label>
              </div>
            </div>
          </section>

          <!-- フォームフッター・送信ボタン -->
          <div class="form-footer">
            <button
              type="submit"
              id="submitBtn"
              class="btn-primary btn-primary--full btn-primary--large"
            >
              <span id="submitBtnSpinner" style="display:none; width:20px; height:20px; border:3px solid rgba(255,255,255,0.4); border-top-color:white; border-radius:50%; animation: spin 0.8s linear infinite;"></span>
              <span id="submitBtnText">保存して制度を探す</span>
            </button>
          </div>

        </form>
      </div>
    </div>
    <!-- /container -->

  </main>

  <!-- フッターナビ -->
  <nav class="footer-nav" aria-label="メインナビゲーション">
    <a href="account.html" class="footer-nav__item active">
      <img src="icon/human.svg" class="footer-nav__icon" alt="">
      <span class="footer-nav__label">アカウント</span>
    </a>
    <a href="recommend.html" class="footer-nav__item">
      <img src="icon/search.svg" class="footer-nav__icon" alt="">
      <span class="footer-nav__label">探す</span>
    </a>
    <a href="notice.html" class="footer-nav__item">
      <img src="icon/notice.svg" class="footer-nav__icon" alt="">
      <span class="footer-nav__label">通知</span>
    </a>
  </nav>

  <script src="app.js"></script>
</body>
</html>
