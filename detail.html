<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="補助金・支援制度の詳細情報 | BenefitAI" />
  <title>制度詳細 | BenefitAI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ページ本体 -->
  <main class="page-wrapper">
    <div class="container" style="padding-top: var(--space-5); padding-bottom: calc(var(--footer-nav-height) + var(--space-6));">

      <!-- ローディング -->
      <div id="detailLoading" class="detail-loading">
        <div class="loading-spinner" style="margin: 0 auto var(--space-4);"></div>
        <p style="color: var(--color-text-muted); font-size: var(--font-size-sm);">制度情報を読み込み中...</p>
      </div>

      <!-- 詳細コンテンツ（detail.js により動的生成） -->
      <div id="detailContent" style="display: none;"></div>

    </div>
  </main>

  <!-- フッターナビ -->
  <nav class="footer-nav" aria-label="メインナビゲーション">
    <a href="account.html" class="footer-nav__item">
      <img src="icon/human.svg" class="footer-nav__icon" alt="">
      <span class="footer-nav__label">アカウント</span>
    </a>
    <a href="index.html" class="footer-nav__item active">
      <img src="icon/search.svg" class="footer-nav__icon" alt="">
      <span class="footer-nav__label">探す</span>
    </a>
    <a href="notice.html" class="footer-nav__item">
      <img src="icon/notice.svg" class="footer-nav__icon" alt="">
      <span class="footer-nav__label">通知</span>
    </a>
  </nav>

  <script src="detail.js"></script>
</body>
</html>
